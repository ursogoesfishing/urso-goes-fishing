<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urso Goes Fishing</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f2ea;
      color: #111;
      text-align: center;
      padding: 60px 20px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      letter-spacing: -1px;
    }

    h2 {
      font-size: 22px;
      font-weight: 400;
      margin-bottom: 30px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    .buttons {
      margin-top: 35px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    a {
      color: #111;
      text-decoration: none;
      border: 2px solid #111;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
    }

    a:hover {
      background: #111;
      color: #f5f2ea;
    }

    .email {
      margin-top: 40px;
      font-size: 16px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Urso Goes Fishing</h1>
    <h2>Spinning in mare, test reali e cappotti sinceri.</h2>

    <p>
      Luigi Urso pesca in mare tra predatori mediterranei,
      attrezzatura testata sul campo, idee discutibili e zero fuffa.
    </p>

    <div class="buttons">
      <a href="#" target="_blank">YouTube</a>
      <a href="#" target="_blank">Instagram</a>
      <a href="#" target="_blank">TikTok</a>
    </div>

    <p class="email">
      Collaborazioni: ursogoesfishing@gmail.com
    </p>
  </main>
</body>
</html>
